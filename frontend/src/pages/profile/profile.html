<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLib - Profile</title>
    <link rel="stylesheet" href="../../assets/css/common/navbar.css">
    <link rel="stylesheet" href="../../assets/css/common/profile.css">
</head>
<body>

    <header class="top-bar">
        <div class="logo">SmartLib</div>
    </header>

    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="../dashboard/dashboard.html">Dashboard</a></li>
            <li><a href="../discover/discover.html">Discover</a></li>
            <li><a href="../catalog/catalog.html">Catalog</a></li>
            <li><a href="../user-library/user-library.html">My Library</a></li>
            <li><a href="../profile/profile.html" class="active">My Profile</a></li>
            <li><a href="../help/help.html">Help</a></li>
            <li><a href="../auth/logout.html">Log out</a></li>
        </ul>
    </nav>

    <main class="profile-container">

        <aside class="sidebar">
            <ul class="sidebar-links">
                <li><a href="#" class="active">Profile Overview</a></li>
                <li><a href="../profile/edit_prof.html">Edit Profile &amp; Academic Interests</a></li>
                <li><a href="../profile/pref_and_reco_settings.html">Preferences and Recommendation Settings</a></li>
                <li><a href="../profile/reading_stats.html">Reading Statistics</a></li>
            </ul>
        </aside>

        <section class="profile-content">

            <div class="user-info-card">
                <div class="avatar-placeholder" id="avatar"></div>
                <div class="user-details">
                    <p class="detail-label" id="user-name">—</p>
                    <p class="detail-label" id="user-school">—</p>
                    <p class="detail-label" id="user-status">Student</p>
                </div>
            </div>

            <div class="academic-interests">
                <h2 class="section-title">Academic Interests</h2>
                <div class="interest-cards" id="interest-cards"></div>
            </div>

        </section>
    </main>

<script>
(function () {
  // Read from localStorage — same source as edit_prof.html
  const name    = localStorage.getItem('name')   || '—';
  const school  = localStorage.getItem('school') || '—';
  const status  = localStorage.getItem('status') || 'Student';
  const interests = JSON.parse(localStorage.getItem('interests') || '[]');

  document.getElementById('user-name').textContent   = name;
  document.getElementById('user-school').textContent = school;
  document.getElementById('user-status').textContent = status;

  // Profile picture
  const picData = localStorage.getItem('profilePic');
  if (picData) {
    const avatar = document.getElementById('avatar');
    avatar.style.backgroundImage    = `url(${picData})`;
    avatar.style.backgroundSize     = 'cover';
    avatar.style.backgroundPosition = 'center';
  }

  // Academic interests
  const container = document.getElementById('interest-cards');
  if (interests.length) {
    container.innerHTML = interests.map(int => `
      <div class="interest-card">
        <p class="interest-name">${int.name}</p>
        <p class="interest-count">${int.count}</p>
        <p class="interest-sub">Related books</p>
      </div>`).join('');
  } else {
    container.innerHTML = `
      <div class="interest-card">
        <p class="interest-name" style="font-size:0.85rem;color:#555;">No interests set yet.</p>
        <p class="interest-sub">Edit your profile to add interests</p>
      </div>`;
  }
})();
</script>

    <script type="module" src="../../assets/js/auth/authGuard.js"></script>
</body>
</html>
