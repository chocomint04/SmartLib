<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLib - Profile</title>
    <link rel="stylesheet" href="../../assets/css/common/navbar.css">
    <link rel="stylesheet" href="../../assets/css/common/profile.css">
</head>
<body>

    <!-- Top Logo Bar -->
    <header class="top-bar">
        <div class="logo">SmartLib</div>
    </header>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="../dashboard/dashboard.html">Dashboard</a></li>
            <li><a href="../discover/discover.html">Discover</a></li>
            <li><a href="../catalog/catalog.html">Catalog</a></li>
            <li><a href="../user-library/user-library.html">My Library</a></li>
            <li><a href="../profile/profile.html" class="active">My Profile</a></li>
            <li><a href="../help/help.html">Help</a></li>
            <li><a href="../auth/logout.html">Log out</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="profile-container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <ul class="sidebar-links">
                <li><a href="../profile/profile.html">Profile Overview</a></li>
                <li><a href="../profile/edit_prof.html">Edit Profile &amp; Academic Interests</a></li>
                <li><a href="#" class="active">Preferences and Recommendation Settings</a></li>
                
                <li><a href="../profile/reading_stats.html">Reading Statistics</a></li>
            </ul>
        </aside>

        <!-- Preferences / Recommendation Settings Content -->
        <section class="content">

            <!-- Preferences Settings -->
            <div class="settings-section">
                <h2 class="settings-title">Preferences Settings</h2>
                <div class="settings-list">
                    <label class="setting-item">
                        <input type="checkbox" data-key="prioritizeEbooks">
                        <span>Prioritize E-books and digital resources over physical copies.</span>
                    </label>
                    <label class="setting-item">
                        <input type="checkbox" data-key="languageOnly">
                        <span>Recommend books in my primary language only.</span>
                    </label>
                    <label class="setting-item">
                        <input type="checkbox" data-key="includeResearch">
                        <span>Include advanced research papers and academic journals in my feed.</span>
                    </label>
                    <label class="setting-item">
                        <input type="checkbox" data-key="newMaterialsFirst">
                        <span>Show me newly published materials (i.e. last 2 years) first.</span>
                    </label>
                </div>
            </div>

            <!-- Recommendation Settings -->
            <div class="settings-section">
                <h2 class="settings-title">Recommendation Settings</h2>
                <div class="settings-list">
                    <label class="setting-item">
                        <input type="checkbox" data-key="suggestOutside">
                        <span>Suggest books from related academic fields outside my main interests.</span>
                    </label>
                    <label class="setting-item">
                        <input type="checkbox" data-key="highlightTrending">
                        <span>Highlight trending titles and most-borrowed books in my department.</span>
                    </label>
                    <label class="setting-item">
                        <input type="checkbox" data-key="showPeers">
                        <span>Show me what other learners in my course are currently reading.</span>
                    </label>
                    <label class="setting-item">
                        <input type="checkbox" data-key="weeklySummary">
                        <span>Send a weekly 'Recommended for You' summary to my inbox.</span>
                    </label>
                </div>
            </div>

        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const defaults = {
                prioritizeEbooks: false,
                languageOnly: false,
                includeResearch: false,
                newMaterialsFirst: false,
                suggestOutside: false,
                highlightTrending: false,
                showPeers: false,
                weeklySummary: false
            };

            const checkboxes = document.querySelectorAll('input[type=checkbox][data-key]');
            checkboxes.forEach(cb => {
                const key = cb.getAttribute('data-key');
                const saved = localStorage.getItem(key);
                if (saved !== null) {
                    cb.checked = saved === 'true';
                } else if (key in defaults) {
                    cb.checked = defaults[key];
                }
                cb.addEventListener('change', () => {
                    localStorage.setItem(key, cb.checked);
                });
            });
        });
    </script>
    <script type="module" src="../../assets/js/auth/authGuard.js"></script>
</body>
</html>
