<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartLib — Create an Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../../assets/css/login/login.css"/>
</head>

<body>

<div class="layout">

  <!-- LEFT: Library visual -->
  <div class="panel-left">
    <img
      src="https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=900&q=80"
      alt="Library shelves"
    />
    <div class="panel-left-overlay"></div>
    <div class="brand-text">
      <span class="logo">SmartLib</span>
      <h1>Find What You Need,<br/><em>Faster.</em></h1>
      <p>Create your account and unlock smart recommendations tailored to your academic journey.</p>
    </div>
  </div>

  <!-- RIGHT: Form -->
  <div class="panel-right">
    <div class="form-card">
      <div class="form-header">
        <span class="ornament">❧</span>
        <h2>Create Account</h2>
        <p>Join SmartLib today</p>
      </div>

      <div class="divider"><span>sign up</span></div>

      <form id="signupForm" novalidate>
        <div class="field">
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" placeholder="John Doe" autocomplete="name" required />
        </div>

        <div class="field">
          <label for="email">Institutional Email</label>
          <input type="email" id="email" placeholder="you@university.edu" autocomplete="email" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" required />
          <span class="field-icon" id="togglePwd" title="Show/hide password">👁</span>
        </div>

        <div class="field">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" autocomplete="new-password" required />
          <span class="field-icon" id="toggleConfirm" title="Show/hide password">👁</span>
        </div>

        <div class="row-meta">
          <label class="checkbox-label">
            <input type="checkbox" id="agree" required />
            I agree to the Terms of Service and Privacy Policy
          </label>
        </div>

        <button type="submit" class="btn-signin" id="signupBtn">Create Account</button>
      </form>

      <p class="register-line">Already have an account? <a href="/login">Sign In</a></p>

      <p class="terms">
        By creating an account, you agree to our
        <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
      </p>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module" src="../../assets/js/firebase/firebase.js"></script>
<script type="module" src="../../assets/js/auth/authGuard.js"></script>
<script type="module" src="../../assets/js/auth/signup.js"></script>
</body>
</html>
