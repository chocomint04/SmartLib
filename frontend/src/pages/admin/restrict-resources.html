<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLib - Restrict Resources</title>
    <link rel="stylesheet" href="../../assets/css/admin/admin-dashboard.css">
    <link rel="stylesheet" href="../../assets/css/admin/user-management.css">
</head>
<body>

    <header class="top-bar">
        <div class="logo-area">
            <div class="logo">SmartLib</div>
            <div class="logo-sub">Admin Panel</div>
        </div>
        <nav class="admin-nav">
            <a href="admin-dashboard.html" class="nav-link active">Dashboard</a>
            <a href="analytics.html" class="nav-link">Analytics</a>
            <a href="archives.html" class="nav-link">Archives</a>
            <a href="catalog-management.html" class="nav-link">Catalog Management</a>
            <a href="../auth/logout.html" class="nav-link" style="color:#e53935;">Log out</a>
        </nav>
    </header>

    <section class="hero-banner">
        <div class="hero-content">
            <h1>Restrict Resources</h1>
            <p class="hero-sub">Control access to <span class="ai-highlight">grad-only</span> materials</p>
        </div>
    </section>

    <div class="main-grid">
        <section class="card">
            <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
                <div>
                    <h2>Resources</h2>
                    <p class="card-desc" style="margin-bottom:0;">Toggle grad-only access on individual resources.</p>
                </div>
                <div class="search-inline">
                    <input type="text" id="resource-search" placeholder="Search by title or accession no..." />
                </div>
            </div>

            <div class="table-wrapper">
                <table id="resources-table">
                    <thead>
                        <tr>
                            <th>Accession No.</th>
                            <th>Title</th>
                            <th>Program</th>
                            <th>Grad Only</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="resources-tbody">
                        <tr><td colspan="5" class="table-loading">Loading resources…</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script type="module" src="../../assets/js/auth/authGuard.js"></script>
    <script type="module" src="../../assets/js/admin/restrict-resources.js"></script>
</body>
</html>
